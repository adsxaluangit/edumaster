# ============================================================
# Nginx Reverse Proxy - HTTP (khong dung HTTPS)
# Truy cap qua: http://ptnl.mic1.edu.vn hoac http://<IP>
# ============================================================

server {
    listen 80;
    server_name ptnl.mic1.edu.vn www.ptnl.mic1.edu.vn _;

    # Kich thuoc upload/request toi da 50MB
    client_max_body_size 50M;

    # Frontend (React app)
    location / {
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Strapi API
    location /api/ {
        proxy_pass         http://backend:1337/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade     $http_upgrade;
        proxy_set_header   Connection  'upgrade';
        proxy_set_header   Host        $host;
        proxy_set_header   X-Real-IP   $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # Strapi file uploads (anh, file)
    location /uploads/ {
        proxy_pass         http://backend:1337/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host        $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Strapi Admin panel
    location /admin/ {
        proxy_pass         http://backend:1337/admin/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade     $http_upgrade;
        proxy_set_header   Connection  'upgrade';
        proxy_set_header   Host        $host;
        proxy_cache_bypass $http_upgrade;
    }
}
